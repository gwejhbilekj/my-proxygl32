name: Build ProxyGL32on:  push:    branches: [ "main" ] # Jalankan setiap kali kamu push ke branch main  workflow_dispatch: # Agar bisa dijalankan manual lewat tomboljobs:  build:    runs-on: windows-latest    steps:    - name: Checkout Repository      uses: actions/checkout@v4    - name: Configure CMake      # Sesuaikan path jika CMakeLists.txt ada di dalam folder src      run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64    - name: Build Project      run: cmake --build build --config Release    - name: Upload DLL Artifact      uses: actions/upload-artifact@v4      with:        name: opengl32-dll        path: build/Release/opengl32.dll